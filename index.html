<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pase de Acceso - Invitado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* ESTILO CORPORATIVO UNIFICADO */
        body { 
            background-image: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.1)), url('FONDO 1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px 0;
               }
        .ticket-card {
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 10px; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
            max-width: 450px; 
            margin: auto;
        }
        .header-blue { 
            background: #0d6efd; 
            color: white; 
            padding: 0 0 20px 0;
            text-align: center; 
        }
        .logo-container {
            background: white;
            display: block;
            padding: 20px 0;
            margin-bottom: 20px;
        }
        .logo-pase {
            width: 80%;
            max-width: 500px;
            height: auto;
            margin: 0 auto;
            display: block;
        }
        .content { padding: 25px; }
        #qrcode { 
            background: white; 
            padding: 15px; 
            border: 2px solid #0d6efd;
            border-radius: 12px; 
            display: inline-block; 
            margin-top: 20px;
        }
        .reloj-container {
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 15px;
        }
        #relojActivo {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 1.8rem;
            font-weight: bold;
            color: #0d6efd;
            display: block;
        }

    .reloj-label {
            font-size: 0.7rem;
            color: #6c757d;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .status-badge { 
            font-size: 0.8rem; 
            padding: 8px 16px; 
            border-radius: 50px; 
            font-weight: 600;
            margin-top: 10px; 
        }
        #capaQR { display: none; text-align: center; }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px;
            border: 1px solid #ced4da;
        }

        .form-label { font-weight: 600; color: #495057; }
    </style>
</head>
<body>

<div class="container">
    <div class="ticket-card">
        <div class="header-blue">
            <div class="logo-container">
                <img src="LOGO-CPDV.png" alt="Logo Colegio" class="logo-pase">
            </div>
            <h4 class="mb-0">Pase de Acceso Digital</h4>
        </div>
        <div class="content">
            <div id="formInvitado">
                <div class="mb-3">
                    <label class="form-label">RUN (Cédula de Identidad)</label>
                    <input type="text" id="run" class="form-control" placeholder="12345678-9" 
                           oninput="this.value = formatearRUT(this.value)">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" id="nombre" class="form-control" placeholder="Juan Pérez">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo de Entrada</label>
                    <select id="tipoEntrada" class="form-select" onchange="togglePatente()">
                        <option value="peatonal">Peatonal</option>
                        <option value="vehicular">Vehicular</option>
                    </select>
                </div>

                <div id="divPatente" class="mb-3" style="display:none;">
                    <label class="form-label">Patente</label>
                    <input type="text" id="patente" class="form-control" 
       placeholder="ABCD12" 
       maxlength="6" 
       style="text-transform: uppercase;"
       oninput="this.value = this.value.replace(/[^a-zA-Z0-9]/g, '')">
                </div>

                <div class="mb-3">
                    <label class="form-label">Motivo de Ingreso</label>
                    <select id="motivo" class="form-select" onchange="verificarMotivoEspecial()">
                        <option value="">Seleccione una opción...</option>
            <option value="APODERADO-RETIRO ESTUDIANTE-ENFERMERIA-INSPECTORIA">Apoderado-Retiro Estudiante: Enfermería, Inspectoría</option>
            <option value="APODERADO-ENTREGAR ELEMENTOS">Apoderado-Entregar elementos</option>
            <option value="APODERADO-SELECCIONES O TALLERES CPDV">Apoderado-Selecciones o Talleres CPDV</option>
            <option value="APODERADO-CITA ADMISION-RECAUDACION">Apoderado-Cita Admisión-Recaudación</option>
            <option value="APODERADO-CITA DOCENTE">Apoderado-Cita docente</option>
            <option value="APODERADO-ACTIVIDADES ESPECIALES">Apoderado-Actividades especiales</option>
            <option value="VISITA-ISP">Visita-ISP</option>
            <option value="VISITA-ADMISION">Visita-Admisión</option>
            <option value="VISITA-ENTREVISTA">Visita-Entrevista</option>
            <option value="VISITA-PERSONAL DE APOYO-PSICOLOGIA, TERAPIA">Visita-Personal de apoyo: Psicología, Terapia ocupacional</option>
            <option value="VISITA-ACTIVIDADES ESPECIALES">Visita-Actividades especiales</option>
            <option value="VISITA-ARRIENDOS">Visita-Arriendos</option>
            <option value="VISITA-PROVEEDORES">Visita-Proveedores</option>
            <option value="COLABORADORES-SERVICIOS">Colaboradores-Servicio</option>	
                    </select>
                </div>

<div class="col-md-12 mb-3" id="contenedorExtra" style="display: none;">
    <label class="form-label" id="labelExtra">Detalle de Visita</label>
        <select id="detalleSelect" class="form-select" style="display: none;"></select>
        <input type="text" id="detalleInput" class="form-control" style="display: none;" placeholder="">
</div>

                <button id="btnGenerar" onclick="generarPase()" class="btn btn-primary w-100 btn-lg">Validar y Generar QR</button>
            </div>

            <div id="capaQR">
                <div id="qrcode"></div>
                <div class="reloj-container">
                    <span class="reloj-label">Validación de Seguridad en Vivo</span>
                    <span id="relojActivo">00:00:00</span>
                    <small class="text-muted" style="font-size: 0.65rem;">Muestre el segundero en movimiento al guardia</small>
                </div>
                <h5 id="mostrarNombre" class="mt-3 mb-3" style="color: #0d6efd;"></h5>
                <span class="status-badge bg-success text-white shadow-sm">PASE VÁLIDO POR 1 HORA</span>
                <hr>
                <p class="text-muted small">Al llegar a portería, presente este código para registrar su ingreso automáticamente.</p>
                <button onclick="location.reload()" class="btn btn-outline-secondary btn-sm">Generar otro</button>
            </div>
        </div>
    </div>
</div>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxxqnqbO5mlM_MF03BaeIarRVtblqXaKT7bOfbR4uhirLPHeESjy4hKmoLc1CPjymDF/exec";

    // --- NUEVA FUNCIÓN PARA LIMPIAR CARACTERES ---
function limpiarTexto(texto) {
        if (!texto) return "";
        return texto.normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "") // Elimina tildes
                    .replace(/\//g, "-")            // Cambia barras / por guiones -
                    .toUpperCase()                   // Todo a mayúsculas
                    .trim();                         // Quita espacios sobrantes
    }

    function formatearRUT(rut) {
        let valor = rut.replace(/[^0-9kK]/g, '');
        if (valor.length < 2) return valor;
        let cuerpo = valor.slice(0, -1);
        let dv = valor.slice(-1).toUpperCase();
        return cuerpo + "-" + dv;
    }

function validarPatente(patente) {
    // Si es Peatonal o no hay patente, devolvemos true (es válido que no haya)
    if (!patente || patente === "NA" || patente === "SN") return true;
    // Limpiamos espacios y pasamos a mayúsculas
    const p = patente.trim().toUpperCase();
        // Formatos Chilenos:
    // 1. ABCD12 (Nuevas: 4 letras + 2 números)
    // 2. AB1234 (Antiguas: 2 letras + 4 números)
    // Excluimos letras que no se usan en patentes chilenas (O, I) opcionalmente, 
    // pero esta es la regex estándar:
    const regexPatente = /^([A-Z]{4}\d{2}|[A-Z]{2}\d{4})$/;
    return regexPatente.test(p);
}

    function togglePatente() {
        const tipo = document.getElementById('tipoEntrada').value;
        document.getElementById('divPatente').style.display = (tipo === 'vehicular') ? 'block' : 'none';
    }

function verificarMotivoEspecial() {
    const motivo = document.getElementById('motivo').value;
    const contenedor = document.getElementById('contenedorExtra');
    const select = document.getElementById('detalleSelect');
    const input = document.getElementById('detalleInput');
    const label = document.getElementById('labelExtra');

    // --- CONFIGURACIÓN DE OPCIONES ---
    
    // 1. Motivos que despliegan una LISTA
    const opcionesLista = {
        "VISITA-PERSONAL DE APOYO-PSICOLOGIA, TERAPIA": {label: "Seleccione Ciclo que recibe el apoyo:", items: ["EARLY YEARS", "PRIMARY SCHOOL", "SENIOR SCHOOL"]},
        "COLABORADORES-SERVICIOS": {label: "Seleccione Ciclo que recibe el apoyo:", items: ["ASEO", "GUARDIA", "KIOSKO", "CASINO", "VIDACCION", "PREUNIVERSITARIO", "TALLERES/SELECCIONES"]}
    };

    // 2. Motivos que despliegan un campo de TEXTO LIBRE
    const opcionesTexto = {
        "APODERADO-CITA DOCENTE": "Nombre del convocante",
        "APODERADO-SELECCIONES O TALLERES CPDV": "Nombre de selección/taller",
        "VISITA-ENTREVISTA": "Nombre del convocante",
        "APODERADO-ACTIVIDADES ESPECIALES": "Nombre del Evento o Actividad",
        "VISITA-ACTIVIDADES ESPECIALES": "Nombre del Evento o Actividad",
        "VISITA-ARRIENDOS":"Nombre de la Empresa/Club/Institución",
        "VISITA-PROVEEDORES": "Nombre de la Empresa/Proveedor"
    };

    // --- LÓGICA DE VISIBILIDAD ---
    
    // Reset inicial
    contenedor.style.display = "none";
    select.style.display = "none";
    input.style.display = "none";
    input.value = "";

    // CASO A: Es un motivo de LISTA
    if (opcionesLista[motivo]) {
        contenedor.style.display = "block";
        select.style.display = "block";
        
        // Aplicamos el label específico definido arriba
        label.innerText = opcionesLista[motivo].label;
        
        // Limpiamos y llenamos el select
        select.innerHTML = "";
        opcionesLista[motivo].items.forEach(opt => {
            select.add(new Option(opt, opt));
        });
    } 
    // CASO B: Es un motivo de TEXTO LIBRE
    else if (opcionesTexto[motivo]) {
        contenedor.style.display = "block";
        input.style.display = "block";
        
        // Aplicamos el label definido arriba
        label.innerText = opcionesTexto[motivo] + ":";
        input.placeholder = "Escriba aquí...";
    }
}

    function iniciarReloj() {
        const reloj = document.getElementById('relojActivo');
        setInterval(() => {
            const ahora = new Date();
            reloj.innerText = ahora.toLocaleTimeString();
        }, 1000);
    }

async function generarPase() {
    const btn = document.getElementById('btnGenerar');
    let rut = document.getElementById('run').value.trim();
    const nombreRaw = document.getElementById('nombre').value.trim();
    const tipo = document.getElementById('tipoEntrada').value;
    
    // 1. Captura de Patente
    const patenteRaw = document.getElementById('patente').value.trim().toUpperCase();
    const patente = (tipo === 'vehicular') ? (patenteRaw || "SN") : "NA";
    
    const motivoRaw = document.getElementById('motivo').value;

    // --- NUEVA LÓGICA DE CAPTURA DE DETALLE ---
    let detalleFinal = "SD"; 
    const divExtra = document.getElementById('contenedorExtra');
    
    // Si el contenedor de detalle está visible, buscamos el valor
    if (divExtra.style.display !== 'none') {
        const sel = document.getElementById('detalleSelect');
        const inp = document.getElementById('detalleInput');
        
        // Si el select está visible, tomamos su valor; si no, el del input
        detalleFinal = (sel.style.display !== 'none') ? sel.value : (inp.value.trim() || "SD");
    }
    // ------------------------------------------

    // 2. Validaciones básicas de campos vacíos
    if (rut.length < 8 || !motivoRaw || !nombreRaw) {
        alert("Por favor, complete todos los campos requeridos.");
        return;
    }

    // 3. NUEVA VERIFICACIÓN DE PATENTE (Solo si es vehicular)
    if (tipo === 'vehicular') {
        // Llamamos a la función de validación que creamos antes
        if (!validarPatente(patenteRaw)) {
            alert("⚠️ La patente ingresada no es válida.\nDebe tener formato Chileno (Ej: ABCD12 o AB1234).");
            document.getElementById('patente').focus();
            return; // Aquí detenemos la ejecución
        }
    }

    // --- De aquí en adelante sigue tu código normal de envío ---
    
    // Limpieza de datos para evitar de envío y overflow
    const nombreLimpio = limpiarTexto(nombreRaw);
    const motivoLimpio = limpiarTexto(motivoRaw);
    const detalleLimpio = limpiarTexto(detalleFinal).substring(0, 50);// Limite de 50 caracteres

    const urlFinal = `${URL_SCRIPT}?accion=validarInvitado&run=${encodeURIComponent(rut)}&nombre=${encodeURIComponent(nombreLimpio)}&tipo=${encodeURIComponent(tipo)}&patente=${encodeURIComponent(patente)}&motivo=${encodeURIComponent(motivoLimpio)}&detalle=${encodeURIComponent(detalleLimpio)}`;
    
    try {
        btn.innerText = "Validando...";
        btn.disabled = true;

        const resp = await fetch(urlFinal);
        const data = await resp.json();

        if (data.autorizado) {
            if (data.limiteExcedido) {
                alert("⚠️ Has superado el límite de 2 pases diarios permitidos.");
                btn.disabled = false;
                btn.innerText = "Validar y Generar QR";
                return;
            }

            const ahora = Date.now();
            const nombreMostrar = data.nombre || nombreLimpio;
            
            // Estructura QR optimizada (sin tildes y con detalle corto)
            const stringQR = `PASE|${rut}|${nombreMostrar}|${tipo}|${patente}|${motivoLimpio}|${detalleLimpio}|${ahora}`;

            document.getElementById('formInvitado').style.display = 'none';
            document.getElementById('capaQR').style.display = 'block';
            document.getElementById('mostrarNombre').innerText = nombreMostrar;

            iniciarReloj();

            document.getElementById("qrcode").innerHTML = "";

            new QRCode(document.getElementById("qrcode"), {
                text: stringQR,
                width: 250,
                height: 250,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L // Nivel Low para máxima capacidad de texto
            });

        } else {
            alert("⚠️ RUT no autorizado en el sistema.");
            btn.innerText = "Validar y Generar QR";
            btn.disabled = false;
        }
    } catch (e) {
        console.error(e);
        alert("❌ Error de comunicación con la base de datos.");
        btn.disabled = false;
        btn.innerText = "Validar y Generar QR";
    }
}
</script>
</body>
</html>
