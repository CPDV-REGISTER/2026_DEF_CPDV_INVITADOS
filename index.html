<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pase de Acceso - Invitado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .ticket-card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 450px; margin: 20px auto;
        }
        .header-blue { background: #0d6efd; color: white; padding: 20px; text-align: center; }
        .content { padding: 25px; }
        #qrcode { background: white; padding: 15px; border: 1px solid #eee; border-radius: 10px; display: inline-block; }
        .status-badge { font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; margin-top: 10px; display: inline-block; }
        #capaQR { display: none; text-align: center; }

        /* ESTILOS DEL RELOJ DE VIDA */
        .reloj-container {
            margin-top: 15px;
            padding: 10px;
            background: #fff5f8;
            border: 2px dashed #ff4081;
            border-radius: 15px;
        }
        #relojActivo {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.8rem;
            font-weight: bold;
            color: #d81b60;
            display: block;
        }
        .reloj-label {
            font-size: 0.7rem;
            color: #ad1457;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="ticket-card">
        <div class="header-blue">
              <h4 class="mb-0">Pase de Acceso Digital</h4>
            <p class="mb-0">Colegio Pedro de Valdivia - Peñalolén</p>
        </div>
        
        <div class="content">
            <div id="formInvitado">
                <div class="mb-3">
                    <label class="form-label">RUN (Cédula de Identidad)</label>
                    <input type="text" id="run" class="form-control" placeholder="12345678-9" 
                           oninput="this.value = formatearRUT(this.value)">
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" id="nombre" class="form-control" placeholder="Juan Pérez">
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo de Entrada</label>
                    <select id="tipoEntrada" class="form-select" onchange="togglePatente()">
                        <option value="peatonal">Peatonal</option>
                        <option value="vehicular">Vehicular</option>
                    </select>
                </div>

                <div id="divPatente" class="mb-3" style="display:none;">
                    <label class="form-label">Patente</label>
                    <input type="text" id="patente" class="form-control" placeholder="AABB11">
                </div>

                <div class="mb-3">
                    <label class="form-label">Motivo de Ingreso</label>
                     <select id="motivo" class="form-select" onchange="verificarMotivoEspecial()">
                        <option value="">Seleccione una opción...</option>
            <option value="APODERADO-RETIRO ESTUDIANTE/ENFERMERÍA">Apoderado-Retiro Estudiante/Enfermería</option>
            <option value="APODERADO-ENTREGA DE ELEMENTOS">Apoderado-Entrega de elementos</option>
            <option value="APODERADO-SELECCIONES/TALLERES CPDV">Apoderado-Selecciones/Talleres CPDV</option>
            <option value="APODERADO-CITA ADMISIÓN/RECAUDACIÓN">Apoderado-Cita Admisión/recaudación</option>
            <option value="APODERADO-CITA DOCENTE">Apoderado-Cita docente</option>
            <option value="VISITA-ISP">Visita-ISP</option>
            <option value="VISITA-SCHOOL TOUR/ADMISIÓN/RECAUDACIÓN">Visita-School tour/Admisión/Recaudación</option>
            <option value="VISITA-ENTREVISTA">Visita-Entrevista</option>
            <option value="VISITA-PERSONAL DE APOYO (PSICOLOGÍA, TERAPIA OCUPACIONAL)">Visita-Personal de apoyo (Psicología, Terapia ocupacional)</option>
            <option value="VISITA-ARRIENDOS">Visita-Arriendos</option>
            <option value="VISITA-PROVEEDORES">Visita-Proveedores</option>
                    </select>
                </div>

                <div class="mb-3" id="contenedorExtra" style="display: none;">
                    <label class="form-label" id="labelExtra">Detalle de Visita</label>
                    <input type="text" id="detalleVisita" class="form-control" placeholder="">
                </div>

                <button id="btnGenerar" onclick="generarPase()" class="btn btn-primary w-100 btn-lg">Validar y Generar QR</button>
            </div>

            <div id="capaQR">
                <div id="qrcode"></div>
                
                <div class="reloj-container">
                    <span class="reloj-label">Validación de Seguridad en Vivo</span>
                    <span id="relojActivo">00:00:00</span>
                    <small class="text-muted" style="font-size: 0.65rem;">Muestre el segundero en movimiento al guardia</small>
                </div>

                <h5 id="mostrarNombre" class="mt-3"></h5>
                <span class="status-badge bg-success text-white">VÁLIDO POR 1 HORA</span>
                <hr>
                <p class="text-muted small">Muestre este QR al guardia en portería.</p>
                <button onclick="location.reload()" class="btn btn-outline-secondary btn-sm">Generar otro</button>
            </div>
        </div>
    </div>
</div>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxxqnqbO5mlM_MF03BaeIarRVtblqXaKT7bOfbR4uhirLPHeESjy4hKmoLc1CPjymDF/exec";

    function formatearRUT(rut) {
        let valor = rut.replace(/[^0-9kK]/g, '');
        if (valor.length < 2) return valor;
        let cuerpo = valor.slice(0, -1);
        let dv = valor.slice(-1).toUpperCase();
        return cuerpo + "-" + dv;
    }

    function togglePatente() {
        const tipo = document.getElementById('tipoEntrada').value;
        document.getElementById('divPatente').style.display = (tipo === 'vehicular') ? 'block' : 'none';
    }

    function verificarMotivoEspecial() {
    const motivo = document.getElementById('motivo').value;
    const contenedor = document.getElementById('contenedorExtra');
    const label = document.getElementById('labelExtra');
    const input = document.getElementById('detalleVisita');
        if (motivo === "VISITA-PROVEEDORES") {
            contenedor.style.display = "block";
            label.innerText = "Nombre de la Empresa/Proveedor";
            input.placeholder = "Ej: Soprole, Chilexpress, etc.";
        } else if (motivo === "VISITA-ARRIENDOS") {
            contenedor.style.display = "block";
            label.innerText = "Nombre de la Organización/Arrendatario";
            input.placeholder = "Ej: Club Deportivo, Evento X, etc.";
        } else {
            contenedor.style.display = "none";
        }
    }

    // Función del Reloj en tiempo real
    function iniciarReloj() {
        const reloj = document.getElementById('relojActivo');
        setInterval(() => {
            const ahora = new Date();
            reloj.innerText = ahora.toLocaleTimeString();
        }, 1000);
    }

async function generarPase() {
    const btn = document.getElementById('btnGenerar');
    let rutRaw = document.getElementById('run').value.trim().replace(/\./g, '');
    if (rutRaw.length > 1 && !rutRaw.includes('-')) {
        rutRaw = rutRaw.slice(0, -1) + "-" + rutRaw.slice(-1);
    }
    
    const rut = rutRaw;
    const nombreForm = document.getElementById('nombre').value.trim();
    const tipo = document.getElementById('tipoEntrada').value;
    const patente = (tipo === 'vehicular') ? (document.getElementById('patente').value.trim() || "SN") : "NA";
    const motivo = document.getElementById('motivo').value;
    const detalle = document.getElementById('detalleVisita').value.trim() || "SD";

    if (rut.length < 8 || !motivo || !nombreForm) {
        alert("Por favor, complete todos los campos requeridos.");
        return;
    }

    // ENVÍO DE INFORMACIÓN AL SCRIPT DE AUTORIZADOS
    const urlFinal = `${URL_SCRIPT}?accion=validarInvitado&run=${encodeURIComponent(rut)}&nombre=${encodeURIComponent(nombreForm)}&tipo=${encodeURIComponent(tipo)}&patente=${encodeURIComponent(patente)}&motivo=${encodeURIComponent(motivo)}&detalle=${encodeURIComponent(detalle)}`;
    try {
        btn.innerText = "Validando...";
        btn.disabled = true;

        const resp = await fetch(urlFinal);
        const data = await resp.json();

        if (data.autorizado) {
            if (data.limiteExcedido) {
                alert("⚠️ Has superado el límite de 2 pases diarios permitidos.");
                btn.disabled = false;
                btn.innerText = "Validar y Generar QR";
                return;
            }

            const ahora = Date.now();
            const nombreFinal = data.nombre || nombreForm;
            
            // ESTRUCTURA QR: PASE | RUT | NOMBRE | TIPO | PATENTE | MOTIVO | DETALLE | TIMESTAMP
            const stringQR = `PASE|${rut}|${nombreFinal}|${tipo}|${patente}|${motivo}|${detalle}|${ahora}`;

            document.getElementById('formInvitado').style.display = 'none';
            document.getElementById('capaQR').style.display = 'block';
            document.getElementById('mostrarNombre').innerText = nombreFinal;

            // Iniciar Reloj de Vida
            iniciarReloj();

            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: stringQR,
                width: 250,
                height: 250,
                correctLevel : QRCode.CorrectLevel.M
            });

        } else {
            alert("⚠️ RUT no autorizado en el sistema.");
            btn.innerText = "Validar y Generar QR";
            btn.disabled = false;
        }
    } catch (e) {
        console.error(e);
        alert("❌ Error de comunicación con la base de datos.");
        btn.disabled = false;
        btn.innerText = "Validar y Generar QR";
    }
}
</script>
</body>
</html>
